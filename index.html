<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    
    <div class="quiz-container" id="quiz-box">
        <div id="start-screen" class="screen active">
            <h1>QUIZ ARENA</h1>
            <p>Test your knowledge and conquer the leaderboard.</p>
            <button class="btn primary-btn" id="start-btn">Start Quiz</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="quiz-header">
                <div class="progress-container">
                    <span id="question-counter">Question 1 of 5</span>
                    <div class="progress-bar"><div id="progress-fill"></div></div>
                </div>
                <div class="score-badge">Score: <span id="current-score">0</span></div>
            </div>
            <div class="quiz-body">
                <h2 id="question-text">Loading question...</h2>
                <div id="options-container" class="options-grid">
                    </div>
            </div>
</body>
</html>
